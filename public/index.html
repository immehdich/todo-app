<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        input { padding: 10px; width: 70%; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; margin: 5px 0; background: #f9f9f9; border-radius: 4px; display: flex; justify-content: space-between; }
        .delete { background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>
    <h1>📝 Todo App Demo Devops </h1> <input type="text" id="todoInput" placeholder="Add a new todo..." /> <button onclick="addTodo()">Add</button> <ul id="todoList"></ul> <script> async 
        function loadTodos() {
            const res = await fetch('/todos');
            const todos = await res.json();
            const list = document.getElementById('todoList');
            list.innerHTML = todos.map(t => `
                <li>${t.text} <button class="delete" onclick="deleteTodo(${t.id})">Delete</button></li>
            `).join('');
        }
        async function addTodo() {
            const text = document.getElementById('todoInput').value;
            if (!text) return;
            await fetch('/todos', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text}) });
            document.getElementById('todoInput').value = '';
            loadTodos();
        }
        async function deleteTodo(id) {
            await fetch(`/todos/${id}`, { method: 'DELETE' });
            loadTodos();
        }
        loadTodos();
    </script>
</body>
</html>
